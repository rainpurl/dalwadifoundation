# Cloudflare Pages configuration.
# The KV id is filled in after you create the namespace (see SETUP.md).
name = "dalwadi-foundation"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

# Binding name MUST be DALWADI_KV (the Functions read env.DALWADI_KV).
[[kv_namespaces]]
binding = "DALWADI_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
